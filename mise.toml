[settings]
minimum_release_age = "7d"  # only install versions released more than 7 days ago - https://mise.en.dev/security.html#minimum-release-age

[env]
EXP_CLUSTER_RESOURCE_SET = "true"
GOTOOLCHAIN = "auto"

[tools]
ctlptl = "0.9.4"
ginkgo = "2.32.0"
go = "1.26.4"
kind = "0.32.0"
kubectl = "1.36.2"
kustomize = "5.8.1"
"go:github.com/kyverno/chainsaw" = "0.2.15"
"go:github.com/golang/mock/mockgen" = "1.6.0"
yq = "4.52.2"
envsubst = "1.4.3"
jq = "1.8.2"
clusterctl = "1.7.4"

[tasks.build]
description = "Build the binary"
run = "make build"

[tasks.lint]
description = "Run lint"
run = "make lint"

[tasks.test]
description = "Run integration tests"
run = "make test"

[tasks.image-build]
description = "Build the container image"
run = "make docker-build"

[tasks.image-push]
description = "Push the container image"
run = "make docker-push"

[tasks.mgmt-and-capl-cluster]
description = "Create a management and CAPL cluster"
run = "make mgmt-and-capl-cluster"

[tasks.mgmt-cluster]
description = "Create management cluster"
run = "make mgmt-cluster"

[tasks.capl-cluster]
description = "Create CAPL cluster"
run = "make capl-cluster"

[tasks.cleanup-cluster]
description = "Cleanup the management and CAPL clusters"
run = "make cleanup-cluster"

[tasks.e2e-test]
description = "Run e2e tests"
run = "make e2e-test"

[tasks.upstream-e2e-tests]
description = "Run upstream e2e tests"
run = "make upstream-e2e-tests"

[tasks.csi-sanity-test]
description = "Run CSI sanity tests"
run = "make csi-sanity-test"

