name: Continuous Integration
on:
  workflow_dispatch: null
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build
      - run: go vet ./...
      - uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
      - run: go test -cover ./...
      - run: make elevated-test
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            linode/linode-blockstorage-csi-driver
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=${{ github.head_ref || github.ref_name }} ,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{raw}},value=${{ github.ref_name }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and Push GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          file: "./Dockerfile"
          tags: |
            ghcr.io/${{steps.meta.outputs.tags}}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REV=${{ github.ref_name }}
      - name: Delete Image from GHCR
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          # NOTE: at now only orgs is supported
          owner: linode
          name: linode-blockstorage-csi-driver
          # NOTE: using Personal Access Token
          token: ${{secrets.GITHUB_TOKEN}}
          tag: ${{ github.head_ref || github.ref_name }} 
